name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      # The entire demo is deterministic (fixed seed data, fixed reference
      # date -- see app/config.py's demo_today), so every API response can
      # be pre-rendered once and served as static files. This is what makes
      # a backend-free GitHub Pages deployment possible at all.
      - name: Export static demo data
        run: python api/scripts/export_static.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build static site
        run: npm run build
        working-directory: web
        env:
          VITE_STATIC: "true"

      - name: Add SPA fallback for client-side routing
        run: cp web/dist/index.html web/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
